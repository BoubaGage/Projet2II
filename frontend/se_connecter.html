<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - My BiblioGest</title>
    <link rel="stylesheet" href="se_connecter.css">
    <link rel="icon" type="image/x-icon" href="/icon/reading_education_knowledge_learning_library_book_icon_256746.png">
</head>
<body class="auth-page">

    <header class="auth-header">
        <div class="brand">
            <img src="/icon/reading_education_knowledge_learning_library_book_icon_256746.png" alt="Logo" class="brand-logo">
            <span class="brand-name">My BiblioGest</span>
        </div>
        <a href="index.html" class="auth-back">← Retour</a>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h1 class="auth-title">Bienvenue</h1>
            <p class="auth-subtitle">Accédez à votre espace de lecture</p>

            <form id="loginForm" class="auth-form auth-form--stack">
                <div class="form-field">
                    <label class="form-label">Identifiant</label>
                    <input name="email" type="text" placeholder="Email / téléphone" class="form-input" required>
                </div>

                <div class="form-field">
                    <label class="form-label">Mot de passe</label>
                    <input name="pwd" type="password" placeholder="••••••••" class="form-input" required>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="auth-submit">
                        Se connecter
                    </button>
                </div>
            </form>

            <p class="auth-switch">
                Nouveau lecteur ? <a href="inscrire.html" class="auth-link">Créer un compte</a>
            </p>
        </div>
    </main>

    <footer class="auth-footer">
        My BiblioGest &bull; Connexion Sécurisée
    </footer>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const data = new FormData(e.target);
        const params = new URLSearchParams(data);
        try {
            const res = await fetch('/api/login?' + params.toString());
            const body = await res.json().catch(() => ({}));
            if (res.ok && body.status === 'ok') {
                // sauvegarder l'email localement pour requêtes ultérieures
                const em = data.get('email');
                try { localStorage.setItem('email', em); } catch(e) {}
                try { localStorage.setItem('role', body.role); } catch(e) {}
                if (body.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'page_user.html';
                }
            } else {
                alert('Connexion échouée : ' + (body.error || res.statusText));
            }
        } catch (err) {
            alert('Erreur réseau');
        }
    });
    </script>
</body>
</html>
