<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Espace - My BiblioGest</title>
    <link rel="icon" type="image/x-icon" href="/icon/reading_education_knowledge_learning_library_book_icon_256746.png">
    <link rel="stylesheet" href="Emprunt.css">
</head>
<body class="page page-library emprunt-page">

    <header class="library-header">
        <div class="brand">
            <img src="/icon/reading_education_knowledge_learning_library_book_icon_256746.png" alt="Logo" class="brand-logo">
            <span class="brand-name">My BiblioGest</span>
        </div>
        <nav class="library-nav">
            <div class="library-nav-link library-nav-link--active">Emprunt</div>
            <a href="page_user.html" class="library-nav-link library-nav-link--hover">Accueil</a>
            <a href="index.html" class="library-nav-link library-nav-link--danger">Quitter</a>
        </nav>
    </header>

    <main class="library-main">
        <div class="library-container">
            
            <div class="library-hero">
                <h1 class="library-title">
                    Vos livres <span class="library-title-accent">emprunter</span> 
                </h1>
                
                <div class="search-bar">
                    <input type="text" id="searchInput" class="search-input" placeholder="Titre, auteur...">
                    <div class="search-icon">🔍</div>
                    <button onclick="lancerRecherche()" class="search-button">Rechercher</button>
                </div>

                <div id="category-filters" class="filters">
                    <button onclick="filtrerParCategorie('')" class="filter-btn filter-btn--active">
                        Tous les genres
                    </button>
                </div>
            </div>

            <div class="results-header">
                <h2 id="result-title" class="results-title">Toute la collection</h2>
                <div class="results-divider"></div>
            </div>

            <div id="livres-grid" class="books-grid">
                <div class="books-empty books-empty--loading">
                    <p class="books-empty-text">Chargement de la bibliothèque...</p>
                </div>
            </div>

        </div>
    </main>

    <footer class="library-footer">
        <p>&copy; 2026 My BiblioGest • Archives Numériques</p>
    </footer>

    <script src="app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async function(){
        const grid = document.getElementById('livres-grid');
        const email = (() => { try { return localStorage.getItem('email'); } catch(e){ return null; } })();
        if (!email) {
            grid.innerHTML = '<div class="books-empty">Vous devez être connecté pour voir vos emprunts.</div>';
            return;
        }
        try {
            const res = await fetch('/api/emprunts?email=' + encodeURIComponent(email));
            if (!res.ok) throw new Error('Erreur serveur');
            const livres = await res.json();
            if (!livres || livres.length === 0) {
                grid.innerHTML = '<div class="books-empty">Vous n\'avez aucun livre emprunté.</div>';
                return;
            }
            grid.innerHTML = '';
            livres.forEach(l => {
                const card = creerCarteLivre(l);
                grid.appendChild(card);
            });
        } catch (err) {
            grid.innerHTML = '<div class="books-empty">Erreur lors du chargement des emprunts.</div>';
            console.error(err);
        }
    });
    </script>
</body>
</html>
