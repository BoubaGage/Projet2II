<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Historique des emprunts - Admin</title>
  <link rel="stylesheet" href="page.css">
  <link rel="icon" type="image/x-icon" href="/icon/reading_education_knowledge_learning_library_book_icon_256746.png">
</head>
<body class="page">
  <header class="library-header">
    <div class="brand">
      <img src="/icon/reading_education_knowledge_learning_library_book_icon_256746.png" alt="Logo" class="brand-logo">
      <span class="brand-name">My BiblioGest — Admin</span>
    </div>
    <a class="library-nav-link" href="admin.html" class="auth-back">← Retour</a>
  </header>
  <main class="library-main">
    <div class="library-container">
      <h1>Historique des emprunts</h1>
      <div id="history" class="books-grid"></div>
    </div>
  </main>
  <footer class="library-footer"><p>&copy; 2026</p></footer>
  <script>
  async function loadHistory(){
    const el = document.getElementById('history');
    try{
      const res = await fetch('/api/emprunts_all');
      if(!res.ok) throw new Error('Erreur serveur');
      const data = await res.json();
      if(!data || data.length===0){ el.innerHTML = '<div class="books-empty">Aucun emprunt enregistré.</div>'; return; }
      el.innerHTML='';
      data.forEach(rec => {
        const div = document.createElement('div');
        div.className = 'book-card';
        const date = new Date((rec.ts||0)*1000).toLocaleString();
        div.innerHTML = `
          <div class="book-cover-link"><div class="book-cover"><img src="${rec.cover || '/icon/reading_education_knowledge_learning_library_book_icon_256746.png'}" class="book-cover-img"></div></div>
          <h3 class="book-title">${rec.titre}</h3>
          <p class="book-author">Utilisateur: ${rec.email} — ${date}</p>
          <div class="book-meta"><a href="${rec.link||'#'}" target="_blank">Lien</a></div>
        `;
        el.appendChild(div);
      });
    }catch(e){ el.innerHTML = '<div class="books-empty">Erreur lors du chargement.</div>'; console.error(e);}  
  }
  document.addEventListener('DOMContentLoaded', loadHistory);
  </script>
</body>
</html>
